<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Gesture Particle Universe</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Courier New', monospace;
    color: #fff;
    user-select: none;
  }

  #three-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  .loader-ring {
    width: 60px; height: 60px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #00e5ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 11px; letter-spacing: 4px; opacity: 0.6; }

  /* Camera preview */
  #camera-wrap {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 200px;
    height: 150px;
    z-index: 20;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.12);
    background: #000;
    box-shadow: 0 0 40px rgba(0,200,255,0.15), inset 0 0 20px rgba(0,0,0,0.5);
  }
  #camera-wrap::before {
    content: 'CAMERA';
    position: absolute;
    top: 6px; left: 10px;
    font-size: 8px;
    letter-spacing: 2px;
    opacity: 0.4;
    z-index: 2;
    pointer-events: none;
  }
  #hand-canvas {
    width: 200px;
    height: 150px;
    transform: scaleX(-1);
    display: block;
  }
  video { display: none; }

  /* Shape display */
  #shape-display {
    position: fixed;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }
  #shape-icon {
    font-size: 44px;
    line-height: 1;
    animation: float 3s ease-in-out infinite;
    display: block;
  }
  #shape-name {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    opacity: 0.5;
    margin-top: 6px;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* Gesture guide */
  #gesture-guide {
    position: fixed;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 20px;
    pointer-events: none;
  }
  .guide-title {
    font-size: 9px;
    letter-spacing: 4px;
    opacity: 0.35;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .guide-item {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    line-height: 2;
    opacity: 0.55;
    transition: opacity 0.3s, color 0.3s;
  }
  .guide-item span.em { font-size: 16px; }
  .guide-item.active { opacity: 1; color: #00e5ff; }

  /* Shape nav dots */
  #shape-dots {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: background 0.4s, transform 0.4s, width 0.4s;
    cursor: pointer;
  }
  .dot:hover { background: rgba(255,255,255,0.5); }
  .dot.active {
    background: #00e5ff;
    transform: scale(1.4);
    box-shadow: 0 0 8px #00e5ff;
    width: 14px;
    border-radius: 3px;
  }

  /* Status bar */
  #status {
    position: fixed;
    bottom: 28px;
    left: 24px;
    z-index: 20;
    font-size: 10px;
    opacity: 0.4;
    letter-spacing: 2px;
    transition: color 0.3s;
  }
  #status.detected { color: #00e5ff; opacity: 0.7; }

  /* Color theme row */
  #theme-row {
    position: fixed;
    top: 28px;
    right: 24px;
    z-index: 20;
    display: flex;
    gap: 6px;
    flex-direction: column;
    align-items: center;
  }
  .theme-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    opacity: 0.35;
    transition: all 0.3s;
    cursor: pointer;
  }
  .theme-dot.active { opacity: 1; transform: scale(1.5); box-shadow: 0 0 8px currentColor; }

  /* Flash overlay */
  #flash {
    position: fixed;
    inset: 0;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    background: radial-gradient(ellipse, rgba(0,229,255,0.3), transparent 70%);
    transition: opacity 0.08s;
  }
  #flash.on { opacity: 1; }

  /* Corner accent lines */
  .corner {
    position: fixed;
    width: 24px; height: 24px;
    z-index: 5;
    border-color: rgba(0,229,255,0.3);
    border-style: solid;
  }
  .corner.tl { top:12px;left:12px; border-width: 1px 0 0 1px; }
  .corner.tr { top:12px;right:12px; border-width: 1px 1px 0 0; }
  .corner.bl { bottom:12px;left:12px; border-width: 0 0 1px 1px; }
  .corner.br { bottom:12px;right:12px; border-width: 0 1px 1px 0; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">INITIALIZING PARTICLE UNIVERSE</div>
  <div class="loader-text" id="loader-sub" style="opacity:0.3">LOADING HAND TRACKING MODEL...</div>
</div>

<!-- Three.js Canvas -->
<canvas id="three-canvas"></canvas>

<!-- Camera Preview -->
<div id="camera-wrap">
  <canvas id="hand-canvas" width="640" height="480"></canvas>
</div>
<video id="video" autoplay playsinline width="640" height="480"></video>

<!-- Shape Info -->
<div id="shape-display">
  <span id="shape-icon">♥</span>
  <div id="shape-name">HEART</div>
</div>

<!-- Gesture Guide -->
<div id="gesture-guide">
  <div class="guide-title">Gestures</div>
  <div class="guide-item" id="g-open"><span class="em">🖐</span> Open Hand → Explode</div>
  <div class="guide-item" id="g-fist"><span class="em">✊</span> Fist → Next Shape</div>
  <div class="guide-item" id="g-peace"><span class="em">✌️</span> Peace → Next Color</div>
  <div class="guide-item" id="g-point"><span class="em">☝️</span> Point → Orbit Mode</div>
  <div class="guide-item" id="g-pinch"><span class="em">🤏</span> Pinch → Scale</div>

</div>

<!-- Shape Dots Nav -->
<div id="shape-dots"></div>

<!-- Status -->
<div id="status">⚡ AWAITING CAMERA</div>

<!-- Color Themes -->
<div id="theme-row"></div>

<!-- Flash -->
<div id="flash"></div>

<!-- Corner accents -->
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ═══════════════════════════════════════════════════════════════
//  GESTURE PARTICLE UNIVERSE  ·  v1.0
// ═══════════════════════════════════════════════════════════════

const N = 1800;          // particle count (reduced for perf)
const MORPH = 0.04;      // morph lerp speed
const AUTO_MS = 7000;    // auto-shape-change interval (ms, no hand)

// ── THREE.JS SETUP ────────────────────────────────────────────
const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
cam.position.z = 5.5;

const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: false, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.25));
renderer.setClearColor(0x000308, 1);

window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Background star field
{
  const sg = new THREE.BufferGeometry();
  const sp = new Float32Array(800 * 3);
  for (let i = 0; i < sp.length; i++) sp[i] = (Math.random() - 0.5) * 200;
  sg.setAttribute('position', new THREE.BufferAttribute(sp, 3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({ color: 0xffffff, size: 0.08, transparent: true, opacity: 0.25 })));
}

// ── PARTICLE GEOMETRY ─────────────────────────────────────────
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(N * 3);
const col = new Float32Array(N * 3);

for (let i = 0; i < N; i++) {
  pos[i * 3]     = (Math.random() - 0.5) * 8;
  pos[i * 3 + 1] = (Math.random() - 0.5) * 8;
  pos[i * 3 + 2] = (Math.random() - 0.5) * 8;
  col[i * 3] = col[i * 3 + 1] = col[i * 3 + 2] = 1;
}

geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

const mat = new THREE.PointsMaterial({
  size: 0.055,
  vertexColors: true,
  transparent: true,
  opacity: 0.95,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const mesh = new THREE.Points(geo, mat);
scene.add(mesh);

// ── SHAPE GENERATORS ─────────────────────────────────────────

function S_Heart(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * Math.PI * 2;
    const ns = () => (Math.random() - 0.5) * 0.15;
    const k = 0.155;
    a[i*3]   = (16 * Math.pow(Math.sin(t), 3)) * k + ns();
    a[i*3+1] = (13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t)) * k - 0.25 + ns();
    a[i*3+2] = ns() * 2.5;
  }
  return a;
}

function S_Sphere(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const phi   = Math.acos(2 * Math.random() - 1);
    const theta = Math.random() * Math.PI * 2;
    const r = 2.3 + (Math.random() - 0.5) * 0.15;
    a[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    a[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    a[i*3+2] = r * Math.cos(phi);
  }
  return a;
}

function S_Cube(n) {
  const a = new Float32Array(n * 3);
  const S = 2.0;
  for (let i = 0; i < n; i++) {
    const f = Math.floor(Math.random() * 6);
    const u = (Math.random() - 0.5) * 2 * S, v = (Math.random() - 0.5) * 2 * S;
    const ns = (Math.random() - 0.5) * 0.04;
    const set = (x, y, z) => { a[i*3]=x; a[i*3+1]=y; a[i*3+2]=z; };
    if      (f===0) set( S+ns, u, v);
    else if (f===1) set(-S+ns, u, v);
    else if (f===2) set(u,  S+ns, v);
    else if (f===3) set(u, -S+ns, v);
    else if (f===4) set(u, v,  S+ns);
    else            set(u, v, -S+ns);
  }
  return a;
}

function S_Flower(n) {
  const a = new Float32Array(n * 3);
  const K = 6;
  for (let i = 0; i < n; i++) {
    const t = Math.random() * Math.PI * 2;
    const r = Math.abs(Math.cos(K / 2 * t)) * 2.4 + (Math.random() - 0.5) * 0.18;
    a[i*3]   = r * Math.cos(t);
    a[i*3+1] = r * Math.sin(t);
    a[i*3+2] = (Math.random() - 0.5) * 0.4;
  }
  return a;
}

function S_Star(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * Math.PI * 2;
    const seg = Math.PI / 5;
    const norm = ((t % (2 * seg)) + 2 * seg) % (2 * seg);
    const inner = 0.95, outer = 2.55;
    const r = (norm < seg)
      ? inner + (outer - inner) * (norm / seg)
      : outer - (outer - inner) * ((norm - seg) / seg);
    const ns = (Math.random() - 0.5) * 0.18;
    a[i*3]   = (r + ns) * Math.cos(t);
    a[i*3+1] = (r + ns) * Math.sin(t);
    a[i*3+2] = (Math.random() - 0.5) * 0.55;
  }
  return a;
}

function S_Galaxy(n) {
  const a = new Float32Array(n * 3);
  const ARMS = 3;
  for (let i = 0; i < n; i++) {
    const arm = Math.floor(Math.random() * ARMS);
    const t   = Math.pow(Math.random(), 0.65) * Math.PI * 4.5;
    const r   = t * 0.52;
    const angle = t + arm * (Math.PI * 2 / ARMS);
    const sp  = (Math.random() - 0.5) * 0.4 * Math.max(r, 0.2);
    a[i*3]   = r * Math.cos(angle) + sp;
    a[i*3+1] = (Math.random() - 0.5) * 0.28;
    a[i*3+2] = r * Math.sin(angle) + sp;
  }
  return a;
}

function S_DNA(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const frac = i / n;
    const t = frac * Math.PI * 10;
    const y = (frac - 0.5) * 4.5;
    if (Math.random() < 0.15) {
      const rt = Math.round(t / (Math.PI * 0.5)) * (Math.PI * 0.5);
      const p  = Math.random() * 2 - 1;
      a[i*3]   = Math.cos(rt) * p;
      a[i*3+1] = (rt / (Math.PI * 10) - 0.5) * 4.5;
      a[i*3+2] = Math.sin(rt) * p;
    } else {
      const s = Math.random() > 0.5 ? 1 : -1;
      a[i*3]   = s * Math.cos(t) + (Math.random() - 0.5) * 0.06;
      a[i*3+1] = y + (Math.random() - 0.5) * 0.03;
      a[i*3+2] = s * Math.sin(t) + (Math.random() - 0.5) * 0.06;
    }
  }
  return a;
}

function S_Torus(n) {
  const a = new Float32Array(n * 3);
  const R = 2.0, r = 0.72;
  for (let i = 0; i < n; i++) {
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI * 2;
    const ns = (Math.random() - 0.5) * 0.08;
    a[i*3]   = (R + r * Math.cos(v)) * Math.cos(u) + ns;
    a[i*3+1] = r * Math.sin(v) + ns;
    a[i*3+2] = (R + r * Math.cos(v)) * Math.sin(u) + ns;
  }
  return a;
}

function S_Butterfly(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = (Math.random() - 0.5) * Math.PI * 4;
    const e = Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5);
    const r = e * 0.62;
    const ns = (Math.random() - 0.5) * 0.12;
    a[i*3]   = r * Math.cos(t) + ns;
    a[i*3+1] = r * Math.sin(t) + ns;
    a[i*3+2] = (Math.random() - 0.5) * 0.35;
  }
  return a;
}

function S_Infinity(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = (Math.random() - 0.5) * Math.PI * 4;
    const d = 1 + Math.sin(t) * Math.sin(t);
    const ns = (Math.random() - 0.5) * 0.18;
    a[i*3]   = 2.8 * Math.cos(t) / d + ns;
    a[i*3+1] = 2.8 * Math.sin(t) * Math.cos(t) / d + ns;
    a[i*3+2] = (Math.random() - 0.5) * 0.32;
  }
  return a;
}

function S_Tornado(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const h = (Math.random() - 0.5) * 4.2;
    const r = Math.pow((h + 2.1) / 4.2, 1.5) * 2.0;
    const t = Math.random() * Math.PI * 14;
    a[i*3]   = r * Math.cos(t) + (Math.random() - 0.5) * 0.1;
    a[i*3+1] = h;
    a[i*3+2] = r * Math.sin(t) + (Math.random() - 0.5) * 0.1;
  }
  return a;
}

function S_Wave(n) {
  const a = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const x = (Math.random() - 0.5) * 6.5;
    const z = (Math.random() - 0.5) * 3.5;
    const y = Math.sin(x * 1.4) * Math.cos(z * 1.4) * 1.3 + (Math.random() - 0.5) * 0.1;
    a[i*3] = x; a[i*3+1] = y; a[i*3+2] = z;
  }
  return a;
}

function S_Ring(n) {
  const a = new Float32Array(n * 3);
  const layers = 5;
  for (let i = 0; i < n; i++) {
    const l = Math.floor(Math.random() * layers);
    const R = 1.0 + l * 0.45;
    const t = Math.random() * Math.PI * 2;
    const ns = (Math.random() - 0.5) * 0.08;
    a[i*3]   = R * Math.cos(t) + ns;
    a[i*3+1] = (l - 2) * 0.5 + (Math.random() - 0.5) * 0.12;
    a[i*3+2] = R * Math.sin(t) + ns;
  }
  return a;
}

function S_Crown(n) {
  const a = new Float32Array(n * 3);
  const POINTS = 8;
  for (let i = 0; i < n; i++) {
    const seg = Math.floor(Math.random() * POINTS);
    const frac = Math.random();
    const angle1 = (seg / POINTS) * Math.PI * 2;
    const angle2 = ((seg + 1) / POINTS) * Math.PI * 2;
    const angle = angle1 + (angle2 - angle1) * frac;
    const r = 2.0;
    const h = (seg % 2 === 0) ? Math.random() * 1.5 : Math.random() * 0.5;
    a[i*3]   = r * Math.cos(angle) + (Math.random() - 0.5) * 0.08;
    a[i*3+1] = h - 0.5;
    a[i*3+2] = r * Math.sin(angle) + (Math.random() - 0.5) * 0.08;
  }
  return a;
}

// ── SHAPES REGISTRY ──────────────────────────────────────────
const SHAPES = [
  { name: 'HEART',      icon: '♥',  gen: S_Heart    },
  { name: 'SPHERE',     icon: '●',  gen: S_Sphere   },
  { name: 'CUBE',       icon: '■',  gen: S_Cube     },
  { name: 'FLOWER',     icon: '✿',  gen: S_Flower   },
  { name: 'STAR',       icon: '★',  gen: S_Star     },
  { name: 'GALAXY',     icon: '🌀', gen: S_Galaxy   },
  { name: 'DNA',        icon: '🧬', gen: S_DNA      },
  { name: 'TORUS',      icon: '⊙',  gen: S_Torus    },
  { name: 'BUTTERFLY',  icon: '🦋', gen: S_Butterfly},
  { name: 'INFINITY',   icon: '∞',  gen: S_Infinity },
  { name: 'TORNADO',    icon: '🌪️', gen: S_Tornado  },
  { name: 'WAVE',       icon: '〰', gen: S_Wave     },
  { name: 'RINGS',      icon: '⊚',  gen: S_Ring     },
  { name: 'CROWN',      icon: '♛',  gen: S_Crown    },
];

// ── COLOR THEMES ─────────────────────────────────────────────
const THEMES = [
  { name: 'Rose',     c1: [1.0, 0.12, 0.35], c2: [1.0, 0.55, 0.75] },
  { name: 'Aqua',     c1: [0.0, 0.9,  1.0],  c2: [0.1, 0.5,  1.0]  },
  { name: 'Aurora',   c1: [0.5, 0.0,  1.0],  c2: [0.9, 0.3,  1.0]  },
  { name: 'Emerald',  c1: [0.0, 1.0,  0.55], c2: [0.0, 0.7,  0.35] },
  { name: 'Solar',    c1: [1.0, 0.75, 0.0],  c2: [1.0, 0.35, 0.0]  },
  { name: 'Arctic',   c1: [0.85, 0.95, 1.0], c2: [0.5, 0.75, 1.0]  },
  { name: 'Neon',     c1: [1.0, 0.0,  0.85], c2: [0.35, 0.0, 1.0]  },
  { name: 'Lime',     c1: [0.7, 1.0,  0.0],  c2: [0.0,  0.9, 0.5]  },
];

// ── THEME COLOR DOT COLORS ────────────────────────────────────
const THEME_COLORS_CSS = [
  '#ff1e5a','#00e5ff','#aa44ff','#00ff88',
  '#ffb300','#d0ecff','#ff00dd','#b8ff00'
];

// ── BUILD UI ─────────────────────────────────────────────────
const dotsEl = document.getElementById('shape-dots');
SHAPES.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.title = s.name;
  d.onclick = () => changeShape(i);
  dotsEl.appendChild(d);
});

const themeEl = document.getElementById('theme-row');
THEMES.forEach((t, i) => {
  const d = document.createElement('div');
  d.className = 'theme-dot' + (i === 0 ? ' active' : '');
  d.style.background = THEME_COLORS_CSS[i];
  d.style.boxShadow = `0 0 6px ${THEME_COLORS_CSS[i]}`;
  d.title = t.name;
  d.onclick = () => changeTheme(i);
  themeEl.appendChild(d);
});

// ── STATE ─────────────────────────────────────────────────────
let shapeIdx  = 0;
let themeIdx  = 0;
let targetPos = S_Heart(N);
let rotXt = 0, rotYt = 0;        // target rotation
let scaleT = 1.0;                 // target scale
let autoRotate  = true;
let handVisible = false;
let lastGesture = '';
let cooldown    = 0;
let autoTimer   = 0;
let explVel     = null;
let explTimer   = 0;
const gestBuf   = [];

// ── HELPERS ──────────────────────────────────────────────────
function updateDots() {
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === shapeIdx));
}
function updateThemeDots() {
  themeEl.querySelectorAll('.theme-dot').forEach((d, i) => d.classList.toggle('active', i === themeIdx));
}

function flash() {
  const f = document.getElementById('flash');
  f.classList.add('on');
  setTimeout(() => f.classList.remove('on'), 120);
}

function highlightGuide(id) {
  ['g-open','g-fist','g-peace','g-point','g-pinch','g-move'].forEach(g => {
    document.getElementById(g)?.classList.remove('active');
  });
  if (id) document.getElementById(id)?.classList.add('active');
}

function changeShape(idx) {
  shapeIdx = idx;
  targetPos = SHAPES[idx].gen(N);
  document.getElementById('shape-icon').textContent = SHAPES[idx].icon;
  document.getElementById('shape-name').textContent = SHAPES[idx].name;
  updateDots();
  flash();
}

function nextShape() {
  changeShape((shapeIdx + 1) % SHAPES.length);
}

function changeTheme(idx) {
  themeIdx = idx;
  updateThemeDots();
  flash();
}

function nextTheme() {
  changeTheme((themeIdx + 1) % THEMES.length);
}

function explode() {
  explVel = new Float32Array(N * 3);
  const p = geo.attributes.position.array;
  for (let i = 0; i < N; i++) {
    const vx = p[i*3], vy = p[i*3+1], vz = p[i*3+2];
    const len = Math.sqrt(vx*vx + vy*vy + vz*vz) || 1;
    const str = Math.random() * 0.25 + 0.08;
    explVel[i*3]   = (vx / len) * str + (Math.random() - 0.5) * 0.06;
    explVel[i*3+1] = (vy / len) * str + (Math.random() - 0.5) * 0.06;
    explVel[i*3+2] = (vz / len) * str + (Math.random() - 0.5) * 0.06;
  }
  explTimer = 70;
  flash();
}

// ── GESTURE DETECTION ────────────────────────────────────────
function extendedFingers(lm) {
  if (!lm || lm.length < 21) return -1;
  let c = 0;
  if (Math.abs(lm[4].x - lm[2].x) > 0.04) c++;       // thumb
  if (lm[8].y  < lm[6].y)  c++;                        // index
  if (lm[12].y < lm[10].y) c++;                        // middle
  if (lm[16].y < lm[14].y) c++;                        // ring
  if (lm[20].y < lm[18].y) c++;                        // pinky
  return c;
}

function pinchDist(lm) {
  const dx = lm[4].x - lm[8].x, dy = lm[4].y - lm[8].y;
  return Math.sqrt(dx * dx + dy * dy);
}

function palmCenter(lm) {
  let x = 0, y = 0;
  [0, 5, 9, 13, 17].forEach(i => { x += lm[i].x; y += lm[i].y; });
  return { x: x / 5, y: y / 5 };
}

function nameGesture(f) {
  if (f === 0) return 'fist';
  if (f === 1) return 'point';
  if (f === 2) return 'peace';
  if (f === 5) return 'open';
  return 'hand';
}

const GESTURE_GUIDE = { open:'g-open', fist:'g-fist', peace:'g-peace', point:'g-point' };

// ── MEDIAPIPE HANDS ──────────────────────────────────────────
const videoEl = document.getElementById('video');
const handCv  = document.getElementById('hand-canvas');
const handCtx = handCv.getContext('2d');

const mpHands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

mpHands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.55,
});

mpHands.onResults(results => {
  handCtx.save();
  handCtx.clearRect(0, 0, 640, 480);
  handCtx.drawImage(results.image, 0, 0, 640, 480);

  if (results.multiHandLandmarks?.length) {
    const lm = results.multiHandLandmarks[0];
    handVisible = true;
    autoRotate  = false;
    document.getElementById('status').textContent = '✋ HAND DETECTED';
    document.getElementById('status').classList.add('detected');

    // Draw skeleton
    try {
      drawConnectors(handCtx, lm, HAND_CONNECTIONS, { color: 'rgba(0,229,255,0.6)', lineWidth: 1.5 });
      drawLandmarks(handCtx, lm, { color: 'rgba(255,80,180,0.9)', fillColor: 'rgba(255,80,180,0.5)', radius: 2.5, lineWidth: 0.5 });
    } catch(_) {}

    // Palm → rotation target
    const pc = palmCenter(lm);
    rotYt = (pc.x - 0.5) * Math.PI * 2.8;
    rotXt = (pc.y - 0.5) * Math.PI * 1.6;

    // Pinch → scale
    const pd = pinchDist(lm);
    if (pd < 0.07) {
      scaleT = Math.max(0.3, 1.0 - (0.07 - pd) * 10);
      highlightGuide('g-pinch');
    } else {
      scaleT = 1.0;
    }

    // Gesture detection with buffer
    const f = extendedFingers(lm);
    const g = nameGesture(f);
    gestBuf.push(g);
    if (gestBuf.length > 7) gestBuf.shift();

    const cnt = {};
    gestBuf.forEach(x => cnt[x] = (cnt[x] || 0) + 1);
    const dom = Object.entries(cnt).sort((a, b) => b[1] - a[1])[0][0];

    if (cooldown <= 0 && dom !== lastGesture) {
      lastGesture = dom;
      cooldown    = 28;
      highlightGuide(GESTURE_GUIDE[dom] || null);

      if (dom === 'open')  explode();
      if (dom === 'fist')  nextShape();
      if (dom === 'peace') nextTheme();
    }

    if (dom === 'point') highlightGuide('g-point');
    if (!['open','fist','peace','point'].includes(dom)) highlightGuide('g-move');

  } else {
    handVisible = false;
    autoRotate  = true;
    document.getElementById('status').textContent = '🎥 SHOW YOUR HAND';
    document.getElementById('status').classList.remove('detected');
    gestBuf.length = 0;
    lastGesture = '';
    highlightGuide(null);
  }

  handCtx.restore();
  if (cooldown > 0) cooldown--;
});

// Start camera
const mpCam = new Camera(videoEl, {
  onFrame: async () => { await mpHands.send({ image: videoEl }); },
  width: 640, height: 480,
});

mpCam.start()
  .then(() => {
    document.getElementById('loader-sub').textContent = 'CAMERA ACTIVE · TRACKING HANDS...';
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.classList.add('hidden');
      setTimeout(() => loader.style.display = 'none', 800);
    }, 1200);
    document.getElementById('status').textContent = '🎥 SHOW YOUR HAND';
  })
  .catch(err => {
    document.getElementById('loader-sub').textContent = '❌ CAMERA ERROR: ' + err.message;
    document.getElementById('status').textContent = '❌ CAMERA BLOCKED';
    // Hide loader anyway so particles are visible
    setTimeout(() => {
      const loader = document.getElementById('loader');
      loader.classList.add('hidden');
      setTimeout(() => loader.style.display = 'none', 800);
    }, 2500);
  });

// ── COLOR UPDATER ────────────────────────────────────────────
let colorFrame = 0;
function applyColors(time) {
  colorFrame++;
  if (colorFrame % 3 !== 0) return;  // only update every 3 frames
  const th = THEMES[themeIdx];
  const c1 = th.c1, c2 = th.c2;
  const p  = geo.attributes.position.array;
  for (let i = 0; i < N; i++) {
    const x = p[i*3], y = p[i*3+1];
    const t = (Math.sin(x * 1.4 + y * 0.8 - time * 1.5) + 1) * 0.5;
    col[i*3]   = c1[0] + (c2[0] - c1[0]) * t;
    col[i*3+1] = c1[1] + (c2[1] - c1[1]) * t;
    col[i*3+2] = c1[2] + (c2[2] - c1[2]) * t;
  }
  geo.attributes.color.needsUpdate = true;
}

// ── RENDER LOOP ──────────────────────────────────────────────
const clock = new THREE.Clock();
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  time += dt;

  const p = geo.attributes.position.array;

  if (explTimer > 0) {
    // Explosion phase
    for (let i = 0; i < N; i++) {
      p[i*3]   += explVel[i*3];
      p[i*3+1] += explVel[i*3+1];
      p[i*3+2] += explVel[i*3+2];
      explVel[i*3]   *= 0.94;
      explVel[i*3+1] *= 0.94;
      explVel[i*3+2] *= 0.94;
    }
    explTimer--;
  } else {
    // Morph toward target
    for (let i = 0; i < N * 3; i++) {
      p[i] += (targetPos[i] - p[i]) * MORPH;
    }
  }
  geo.attributes.position.needsUpdate = true;

  // Colors
  applyColors(time);

  // Rotation
  if (autoRotate) {
    mesh.rotation.y += 0.004;
    mesh.rotation.x += 0.0012;
    // Auto cycle shapes
    autoTimer += dt;
    if (autoTimer > AUTO_MS / 1000) {
      autoTimer = 0;
      nextShape();
    }
  } else {
    autoTimer = 0;
    mesh.rotation.y += (rotYt - mesh.rotation.y) * 0.06;
    mesh.rotation.x += (rotXt - mesh.rotation.x) * 0.06;
  }

  // Scale
  const cs = mesh.scale.x;
  mesh.scale.setScalar(cs + (scaleT - cs) * 0.06);

  renderer.render(scene, cam);
}

animate();
</script>
